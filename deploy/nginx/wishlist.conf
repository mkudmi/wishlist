map $request_uri $wishlist_x_robots_tag {
    default "";
    =/dashboard "noindex, nofollow";
    =/wishlist "noindex, nofollow";
    =/auth/yandex/callback "noindex, nofollow";
    ~^/shared/ "noindex, nofollow";
}

server {
    listen 80;
    listen [::]:80;
    server_name xn--80ajchdgcktejxc.xn--p1ai www.xn--80ajchdgcktejxc.xn--p1ai;

    return 301 https://$host$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name 109.73.202.216;

    root /var/www/wishlist/current;
    index index.html;
    add_header X-Robots-Tag "noindex, nofollow" always;

    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /index.html {
        add_header X-Robots-Tag "noindex, nofollow" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
    }

    location / {
        add_header X-Robots-Tag "noindex, nofollow" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri $uri/index.html /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name xn--80ajchdgcktejxc.xn--p1ai www.xn--80ajchdgcktejxc.xn--p1ai;

