services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: wishlist
      POSTGRES_USER: wishlist
      POSTGRES_PASSWORD: wishlist_password
    volumes:
      - wishlist_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wishlist -d wishlist"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 8080
      CORS_ORIGIN: "*"
      DATABASE_URL: postgresql://wishlist:wishlist_password@db:5432/wishlist
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  wishlist_db_data:
